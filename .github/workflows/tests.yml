name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check out tejas-config
      run: git clone --depth 1 https://tejas-kale:${{ secrets.GH_PAT }}@github.com/tejas-kale/tejas-config.git ../tejas-config

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run tests
      run: uv run pytest
